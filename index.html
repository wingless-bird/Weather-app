<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <h1 id="city-name">Detecting Location...</h1>

    <img id="weather-icon" class="weather-icon" src="img/cloud.png" alt="Weather Icon">

    <h2 id="metric">0°</h2>
    <p id="weather-main">Loading...</p>

    <div class="weather-grid">

        <div class="box">
            Temp
            <span id="temp-main">0°</span>
        </div>

        <div class="box">
            Feels Like
            <span id="temp-feels">0°</span>
        </div>

        <div class="box">
            Humidity
            <span id="humidity">0%</span>
        </div>

        <div class="box">
            Wind
            <span id="wind">0 m/s</span>
        </div>

        <div class="box">
            Sunrise
            <span id="sunrise">--:--</span>
        </div>

        <div class="box">
            Sunset
            <span id="sunset">--:--</span>
        </div>

    </div>

    <div id="future-forecast-box" class="forecast-box"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
