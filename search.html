<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Search Weather</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <h1>Search Weather</h1>

  <div class="search-box">
    <input class="searchinput" placeholder="Enter city name">
    <button class="search-btn">Search</button>
  </div>

  <div class="return">
    <h2 class="city-name">City</h2>

    <img class="weather-img weather-icon" src="img/cloud.png">

    <h1 class="weather-temp">0°</h1>
    <p class="condition">Condition</p>

    <div class="weather-grid">
      <div class="box">Feels Like<br><span class="feels-like">0°</span></div>
      <div class="box">Wind<br><span class="wind">0 m/s</span></div>
      <div class="box">Sunrise<br><span class="sunrise">--:--</span></div>
      <div class="box">Sunset<br><span class="sunset">--:--</span></div>
    </div>

    <div id="search-forecast" class="forecast-box"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
